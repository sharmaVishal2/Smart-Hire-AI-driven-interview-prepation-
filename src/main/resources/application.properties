spring.application.name=smarthire
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/smarthire}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.jwt.secret=${JWT_SECRET:change-this-development-secret-change-this-development-secret}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.ai.provider=${AI_PROVIDER:groq}
app.ai.api-key=${AI_API_KEY:${GROQ_API_KEY:}}
app.ai.model=${AI_MODEL:${GROQ_MODEL:llama-3.1-8b-instant}}
app.ai.url=${AI_URL:${GROQ_URL:https://api.groq.com/openai/v1/chat/completions}}

logging.level.com.smarthire=INFO
